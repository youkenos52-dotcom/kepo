<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Stepmother☺️☺️</title>

<style>

.watch-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:none;
    z-index:999;
}

.watch-btn button{
    background:#ff0000;
    color:#fff;
    border:none;
    padding:18px 38px;
    border-radius:50px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 8px 25px rgba(0,0,0,.4);
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}
:root{
  --primary-bg:#101014;
  --text-main:#fff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  background:var(--primary-bg);
  color:var(--text-main);
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  height:100%;
}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.video-wrapper{
  position:relative;
}

video{
  height:95vh;
  width:auto;
  max-width:100%;
  object-fit:contain;
  background:#000;
  border-radius:12px;
}

.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:80px;
  height:80px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .3s ease;
  z-index:2;
}

.overlay svg{
  width:80px;
  height:80px;
}

#pauseIcon{
  display:none;
}

.overlay.hide{
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>
 

<div class="container">

  <div class="video-wrapper">

    <video
      id="myVideo"
      autoplay
      playsinline
      muted
      preload="auto"
      poster="https://cdn.aceimg.com/hDQS5PDmp.jpg">

      <source src="https://youkenos52-dotcom.github.io/kepo/AM4si6zS1.mp4" type="video/mp4">
    </video>

    <div id="watchBtn" class="watch-btn">
      <button>▶ Watch Full Video</button>
    </div>

    <div class="overlay" id="overlayBtn">
      <svg id="playIcon" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="38" fill="rgba(0,0,0,0.6)"/>
        <polygon points="32,24 60,40 32,56" fill="#fff"/>
      </svg>

      <svg id="pauseIcon" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="38" fill="rgba(0,0,0,0.6)"/>
        <rect x="28" y="24" width="8" height="32" fill="#fff"/>
        <rect x="44" y="24" width="8" height="32" fill="#fff"/>
      </svg>
    </div>

  </div>
</div>

<script>
window.addEventListener("load", () => {

const video = document.getElementById("myVideo");
const overlay = document.getElementById("overlayBtn");
const playIcon = document.getElementById("playIcon");
const pauseIcon = document.getElementById("pauseIcon");
const watchBtn = document.getElementById("watchBtn");

/* tombol klik */
watchBtn.onclick = () => {
    window.location.href = "https://bookchose.com/ud620wgvv3?key=4adc86a8ea6777dca2e5a0765c46f2e9";
};

/* autoplay */
video.play().catch(() => {});

/* toggle */
function toggleVideo(){
  if(video.muted){
    video.muted = false;
    video.volume = 1;
  }

  if(video.paused){
    video.play();
  }else{
    video.pause();
  }
}

overlay.addEventListener("click", toggleVideo);
video.addEventListener("click", toggleVideo);

/* icon control */
video.addEventListener("play", () => {
  playIcon.style.display = "none";
  pauseIcon.style.display = "block";

  setTimeout(() => overlay.classList.add("hide"), 800);
});

video.addEventListener("pause", () => {
  overlay.classList.remove("hide");
  playIcon.style.display = "block";
  pauseIcon.style.display = "none";
});

/* STOP + LOCK setelah 7 detik */
setTimeout(() => {
  video.pause();

  video.style.pointerEvents = "none";
  overlay.style.pointerEvents = "none";

  watchBtn.style.display = "block";
}, 7000);

/* block play lagi */
video.addEventListener("play", () => {
  if (watchBtn.style.display === "block") {
    video.pause();
  }
});

/* fullscreen block */
document.addEventListener("fullscreenchange", () => {
  if(document.fullscreenElement){
    document.exitFullscreen();
  }
});

});
</script>
